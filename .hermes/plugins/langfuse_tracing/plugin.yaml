name: langfuse_tracing
version: "0.2.0"
description: Optional Langfuse tracing for Hermes conversations, LLM calls, and tool usage.
author: Local feature skill
requires_env:
  - HERMES_LANGFUSE_ENABLED
  - HERMES_LANGFUSE_PUBLIC_KEY
  - HERMES_LANGFUSE_SECRET_KEY
provides_hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
